name: Verify

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: verify-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Types, contracts and mobile checks
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint --workspace mobile
      - run: npm run test --workspace @mindshed/api
      - run: npx --yes expo-doctor@1.20.1 apps/mobile
      - run: npm audit --omit=dev --audit-level=high

  database:
    name: PostgreSQL lifecycle and HTTP boundary
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: mindshed
          POSTGRES_PASSWORD: ci-only-password
          POSTGRES_DB: mindshed_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U mindshed -d mindshed_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgres://mindshed:ci-only-password@127.0.0.1:5432/mindshed_test
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run db:migrate --workspace @mindshed/api
      - run: npm run test:integration --workspace @mindshed/api
      - run: npm run test:http --workspace @mindshed/api
      - run: npm run test:lifecycle --workspace @mindshed/api
