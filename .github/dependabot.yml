version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    # Avoid rewriting compatible ranges for every patch. Updating only the
    # resolved lockfile version also prevents duplicate workspace installs.
    versioning-strategy: increase-if-necessary
    groups:
      expo-sdk-56:
        patterns:
          - "expo*"
          - "@expo/*"
          - "eslint-config-expo"
        update-types:
          - patch
      runtime-minor-patch:
        patterns:
          - "@fastify/*"
          - "@trpc/*"
          - "drizzle-*"
          - "fastify"
          - "postgres"
          - "superjson"
          - "zod"
        update-types:
          - minor
          - patch
    ignore:
      # Expo SDK upgrades are coordinated separately; allow compatible patches
      # through the expo-sdk-56 group while blocking the next SDK major.
      - dependency-name: "expo*"
        update-types:
          - "version-update:semver-major"
      - dependency-name: "@expo/*"
        update-types:
          - "version-update:semver-major"
      - dependency-name: "eslint-config-expo"
        update-types:
          - "version-update:semver-major"

      # These versions are selected by Expo SDK 56 and should be changed with
      # `npx expo install --fix`, not independent Dependabot pull requests.
      - dependency-name: "@react-native-async-storage/async-storage"
      - dependency-name: "react"
      - dependency-name: "react-dom"
      - dependency-name: "react-native"
      - dependency-name: "react-native-gesture-handler"
      - dependency-name: "react-native-nitro-modules"
      - dependency-name: "react-native-reanimated"
      - dependency-name: "react-native-safe-area-context"
      - dependency-name: "react-native-screens"
      - dependency-name: "react-native-svg"
      - dependency-name: "react-native-web"
      - dependency-name: "react-native-worklets"

      # The current Expo lint and TypeScript toolchain does not support the next
      # major versions yet; continue accepting compatible updates in-place.
      - dependency-name: "eslint"
        update-types:
          - "version-update:semver-major"
      - dependency-name: "typescript"
        update-types:
          - "version-update:semver-minor"
          - "version-update:semver-major"

      # Keep the compile-time Node API aligned with the Node 22 runtime in
      # `.nvmrc`; patch and minor type updates within v22 remain enabled.
      - dependency-name: "@types/node"
        update-types:
          - "version-update:semver-major"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    open-pull-requests-limit: 3
